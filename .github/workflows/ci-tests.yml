name: CI Tests

on:
  pull_request:
  push:
    branches:
      - main
      - master

permissions:
  contents: read

jobs:
  required-test:
    name: Python Test Gate (required, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.12"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regression suite
        run: python -m tests.test_runner

  advisory-test:
    name: Python Test Gate (advisory, py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    continue-on-error: true
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.8", "3.9", "3.13", "3.14"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run regression suite (advisory)
        id: advisory-tests
        continue-on-error: true
        run: python -m tests.test_runner

      - name: Flag advisory failures
        if: ${{ always() && steps.advisory-tests.outcome == 'failure' }}
        run: |
          echo "::warning::Advisory Python ${{ matrix.python-version }} failed. Merge can proceed, but compatibility follow-up is required."
