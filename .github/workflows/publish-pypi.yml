name: Publish Python package

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: read
  actions: read

jobs:
  test-gate:
    name: Require successful CI Tests run
    runs-on: ubuntu-latest
    steps:
      - name: Verify CI Tests passed for tag commit
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const sha = context.sha;

            const runs = await github.paginate(
              github.rest.actions.listWorkflowRuns,
              {
                owner,
                repo,
                workflow_id: 'ci-tests.yml',
                per_page: 100
              }
            );

            const matching = runs.filter((run) => run.head_sha === sha);
            const success = matching.find((run) => run.conclusion === 'success');

            if (!success) {
              core.setFailed(
                `Release gate blocked: no successful CI Tests run found for commit ${sha}.` +
                ` Push the commit and wait for CI Tests to pass before tagging.`
              );
              return;
            }

            core.info(`Release gate passed via CI run #${success.run_number} (${success.html_url}).`);

  build:
    name: Build distributions
    runs-on: ubuntu-latest
    needs: test-gate
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install build tools
        run: python -m pip install --upgrade pip build twine

      - name: Build sdist and wheel
        run: python -m build

      - name: Validate distributions
        run: python -m twine check dist/*

      - name: Upload distributions
        uses: actions/upload-artifact@v4
        with:
          name: python-dist
          path: dist/

  publish:
    name: Publish to PyPI
    runs-on: ubuntu-latest
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    permissions:
      id-token: write
      contents: read
    environment:
      name: pypi
      url: https://pypi.org/p/kinetic-devops
    steps:
      - name: Download distributions
        uses: actions/download-artifact@v4
        with:
          name: python-dist
          path: dist/

      - name: Publish package distributions to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
